function diffColor(diff) {
  const MAX = 55;
  const t = Math.max(-1, Math.min(1, diff / MAX));
  return t >= 0 ? lerpHex('#EEEEEE','#2E5FA8', t) : lerpHex('#EEEEEE','#B84040', -t);
}
function lerpHex(a, b, t) {
  const h = s => [parseInt(s.slice(1,3),16), parseInt(s.slice(3,5),16), parseInt(s.slice(5,7),16)];
  const [r1,g1,b1]=h(a), [r2,g2,b2]=h(b);
  const r=Math.round(r1+(r2-r1)*t), g=Math.round(g1+(g2-g1)*t), bl=Math.round(b1+(b2-b1)*t);
  return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${bl.toString(16).padStart(2,'0')}`;
}

const map = L.map('map', {center:[36.5,127.8], zoom:7});
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
  attribution:'© OpenStreetMap © CARTO', subdomains:'abcd', maxZoom:19
}).addTo(map);

const GEOJSON_URL = 'https://cdn.jsdelivr.net/gh/southkorea/southkorea-maps@master/kostat/2018/json/skorea-municipalities-2018-geo.json';

fetch(GEOJSON_URL).then(r=>r.json()).then(geo => {
  const getName = p => p.name||p.NAME||p.SIG_KOR_NM||'';
  const gj = L.geoJSON(geo, {
    style: f => {
      const d = DATA[getName(f.properties)];
      return {
        fillColor: d ? diffColor(d.young - d.old) : '#DDDDDD',
        fillOpacity: 0.88, color: '#FFFFFF', weight: 0.6,
      };
    },
    onEachFeature: (f, layer) => {
      const name = getName(f.properties);
      layer.on({
        mouseover: e => e.target.setStyle({weight:2, color:'#333'}),
        mouseout:  e => gj.resetStyle(e.target),
        click:     () => showInfo(name),
      });
    }
  }).addTo(map);
}).catch(() => {
  document.getElementById('infoBox').innerHTML = '<div style="color:#DC6868;font-size:12px">⚠️ 지도 데이터를 불러올 수 없습니다.</div>';
});

function showInfo(name) {
  const d = DATA[name];
  const box = document.getElementById('infoBox');
  if (!d) { box.innerHTML=`<div class="region-name">${name}</div><div class="hint">데이터 없음</div>`; return; }
  const diff = d.young - d.old;
  const color = diff > 0 ? '#2E5FA8' : '#B84040';
  const label = diff > 0 ? '청년 집중 지역' : '노년 집중 지역';
  box.innerHTML = `
    <div class="region-name" style="color:${color}">${name}</div>
    <div style="font-size:11px;color:${color};font-weight:600;margin-bottom:8px">${label}</div>
    <div style="font-size:12px;line-height:2">
      <span style="color:#3A6EA8">● 청년(20–39세)</span> <strong>${d.young}%</strong><br>
      <span style="color:#B84040">● 노년(65세+)</span>&nbsp; <strong>${d.old}%</strong><br>
      <span style="color:#888;font-size:11px">차이: ${diff>0?'+':''}${diff.toFixed(1)}%p</span>
    </div>`;
}
