<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>공공자전거 이용현황 지도</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif; background:#f0f4f8; color:#1a2a3a; height:100vh; display:flex; flex-direction:column; }

#header {
  background: linear-gradient(135deg, #1e3a5f, #2c5282);
  padding: 12px 20px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid #b0c8e0; flex-shrink:0;
  color: white;
}
#header h1 { font-size:16px; font-weight:700; color:#a8d8f0; }
#header .subtitle { font-size:11px; color:#7aaac8; margin-top:2px; }

/* 지역 탭 */
#region-tabs {
  background: #e0eaf5;
  display: flex;
  border-bottom: 2px solid #b0c8e0;
  flex-shrink: 0;
}
.region-tab {
  padding: 10px 28px;
  font-size: 14px; font-weight: 600;
  cursor: pointer;
  border: none; background: transparent;
  color: #5577aa;
  border-bottom: 3px solid transparent;
  transition: all 0.2s;
  display: flex; align-items: center; gap: 8px;
}
.region-tab:hover { background: #d0e0f0; }
.region-tab.active {
  color: #1e3a5f;
  border-bottom: 3px solid #2c7ab5;
  background: white;
}
.region-tab .badge {
  background: #c8ddf0; color: #2a5080;
  font-size: 11px; padding: 1px 7px; border-radius: 10px;
}
.region-tab.active .badge { background: #2c7ab5; color: white; }

#controls {
  background: white;
  padding: 9px 20px;
  display: flex; gap:16px; align-items:center;
  border-bottom: 1px solid #d0dde8;
  flex-shrink:0; flex-wrap:wrap;
}
.ctrl-group { display:flex; align-items:center; gap:8px; }
.ctrl-label { font-size:12px; color:#5577aa; white-space:nowrap; }
.toggle-btn {
  padding:4px 12px; border:1px solid #b0c8e0; border-radius:20px;
  font-size:12px; cursor:pointer; transition:all 0.2s;
  background:transparent; color:#5577aa;
}
.toggle-btn.active { background:#2c7ab5; border-color:#2c7ab5; color:white; }

#stats-bar { display:flex; gap:20px; margin-left:auto; }
.stat { text-align:center; }
.stat .val { font-size:14px; font-weight:700; color:#2c7ab5; }
.stat .lbl { font-size:11px; color:#7799bb; }

#map-container { flex:1; position:relative; }
#map { width:100%; height:100%; }

#legend {
  position:absolute; bottom:24px; right:16px;
  background:rgba(255,255,255,0.95);
  border:1px solid #a0c0e0; border-radius:10px;
  padding:12px 16px; z-index:1000; min-width:160px;
}
#legend h4 { font-size:11px; color:#7799bb; margin-bottom:8px; text-transform:uppercase; letter-spacing:0.5px; }
.legend-item { display:flex; align-items:center; gap:8px; margin:5px 0; font-size:12px; color:#334; }
.legend-dot { border-radius:50%; flex-shrink:0; }
.legend-line { height:3px; width:24px; border-radius:2px; flex-shrink:0; }

#tooltip {
  position:absolute; background:rgba(245,250,255,0.97);
  border:1px solid #90b8d8; border-radius:8px;
  padding:10px 14px; font-size:13px; z-index:2000;
  pointer-events:none; display:none; max-width:220px;
  box-shadow: 0 3px 12px rgba(0,0,0,0.12);
}
.subway-tooltip {
  background: rgba(232,67,147,0.92);
  color: white;
  border: none;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 600;
  padding: 4px 8px;
}
#tooltip .tt-name { font-weight:700; color:#1e3a5f; margin-bottom:6px; font-size:14px; }
#tooltip .tt-row { display:flex; justify-content:space-between; gap:16px; margin:3px 0; color:#556677; font-size:12px; }
#tooltip .tt-val { color:#1a2a3a; font-weight:600; }
.pop-tooltip {
  background: rgba(50,50,50,0.85);
  color: white;
  border: none;
  border-radius: 5px;
  font-size: 12px;
  padding: 3px 8px;
}
</style>
</head>
<body>

<div id="header">
  <div>
    <h1>🚲 공공자전거 이용현황 지도</h1>
    <div class="subtitle">정거장별 대여·반납 현황 및 이동 경로(OD) 시각화</div>
  </div>
  <div id="stats-bar">
    <div class="stat"><div class="val" id="stat-total">-</div><div class="lbl">총 이용 건수</div></div>
    <div class="stat"><div class="val" id="stat-stations">-</div><div class="lbl">정거장 수</div></div>
    <div class="stat"><div class="val" id="stat-od">-</div><div class="lbl">표시 경로</div></div>
  </div>
</div>

<div id="region-tabs">
  <button class="region-tab active" onclick="switchRegion('gwangju')" id="tab-gwangju">
    🚲 광주 타랑께 <span class="badge">53개소</span>
  </button>
  <button class="region-tab" onclick="switchRegion('yeosu')" id="tab-yeosu">
    🚲 여수 여수랑 <span class="badge">46개소</span>
  </button>
</div>

<div id="controls">
  <div class="ctrl-group">
    <span class="ctrl-label">레이어</span>
    <button class="toggle-btn active" id="btn-bubble" onclick="toggleLayer('bubble')">● 이용량 버블</button>
    <button class="toggle-btn active" id="btn-od" onclick="toggleLayer('od')">↔ OD 경로</button>
  </div>
  <div class="ctrl-group">
    <span class="ctrl-label">OD 상위</span>
    <input type="range" id="od-slider" min="5" max="60" value="30" step="5"
           oninput="updateOD(this.value)" style="width:90px; accent-color:#2c7ab5;">
    <span id="od-val" style="font-size:12px; color:#2c7ab5; min-width:24px;">30</span>
  </div>
  <div class="ctrl-group">
    <span class="ctrl-label">버블 기준</span>
    <button class="toggle-btn active" id="btn-total" onclick="setBubbleMode('total')">전체</button>
    <button class="toggle-btn" id="btn-depart" onclick="setBubbleMode('depart')">대여</button>
    <button class="toggle-btn" id="btn-arrive" onclick="setBubbleMode('arrive')">반납</button>
  </div>
  <div class="ctrl-group">
    <span class="ctrl-label">대중교통</span>
    <button class="toggle-btn" id="btn-subway" onclick="toggleSubway()">🚇 지하철역</button>
    <button class="toggle-btn" id="btn-buffer" onclick="toggleBuffer()">📏 역 접근거리</button>
  </div>
  <div class="ctrl-group">
    <span class="ctrl-label">인구 분포</span>
    <button class="toggle-btn" id="btn-pop" onclick="togglePop()">👥 인구 밀집도</button>
  </div>
  <div class="ctrl-group">
    <span class="ctrl-label">자전거 인프라</span>
    <button class="toggle-btn" id="btn-bike" onclick="toggleBikeRoads()">🚴 자전거도로</button>
    <span id="bike-status" style="font-size:11px;color:#7799bb;"></span>
  </div>
</div>

<div id="map-container">
  <div id="map"></div>
  <div id="legend">
    <h4>범례</h4>
    <div class="legend-item"><div class="legend-dot" style="width:20px;height:20px;background:rgba(44,122,181,0.5);border:2px solid #2c7ab5;"></div> 이용량 많음</div>
    <div class="legend-item"><div class="legend-dot" style="width:10px;height:10px;background:rgba(44,122,181,0.25);border:2px solid #2c7ab5;"></div> 이용량 적음</div>
    <div class="legend-item"><div class="legend-line" style="background:rgba(220,100,50,0.9);"></div> OD 경로 (많음)</div>
    <div class="legend-item"><div class="legend-line" style="background:rgba(220,100,50,0.3);"></div> OD 경로 (적음)</div>
    <div class="legend-item" id="legend-subway" style="display:none;"><div style="width:14px;height:14px;background:#e84393;border-radius:50%;border:2px solid white;flex-shrink:0;"></div> 지하철역 (1호선)</div>
    <div id="legend-buffer" style="display:none;">
      <div class="legend-item"><div style="width:14px;height:14px;background:rgba(76,175,80,0.35);border:2px solid rgba(76,175,80,0.8);border-radius:50%;flex-shrink:0;"></div> 역 300m (도보 4분)</div>
      <div class="legend-item"><div style="width:14px;height:14px;background:rgba(255,193,7,0.25);border:2px solid rgba(255,193,7,0.8);border-radius:50%;flex-shrink:0;"></div> 역 500m (도보 7분)</div>
    </div>
    <div id="legend-pop" style="display:none;">
      <h4 style="font-size:11px;color:#7799bb;margin:8px 0 4px;text-transform:uppercase;letter-spacing:0.5px;">인구 분포</h4>
      <div class="legend-item"><div style="width:14px;height:14px;background:#993404;border-radius:2px;flex-shrink:0;"></div> 30,000명 이상</div>
      <div class="legend-item"><div style="width:14px;height:14px;background:#d95f0e;border-radius:2px;flex-shrink:0;"></div> 15,000~30,000명</div>
      <div class="legend-item"><div style="width:14px;height:14px;background:#fe9929;border-radius:2px;flex-shrink:0;"></div> 5,000~15,000명</div>
      <div class="legend-item"><div style="width:14px;height:14px;background:#fed98e;border-radius:2px;flex-shrink:0;"></div> 1,000~5,000명</div>
      <div class="legend-item"><div style="width:14px;height:14px;background:#ffffd4;border:1px solid #ccc;border-radius:2px;flex-shrink:0;"></div> 1,000명 미만</div>
    </div>
    <div id="legend-bike" style="display:none;">
      <h4 style="font-size:11px;color:#7799bb;margin:8px 0 4px;text-transform:uppercase;letter-spacing:0.5px;">자전거도로 (OSM)</h4>
      <div class="legend-item"><div style="height:3px;width:24px;background:#2ecc71;border-radius:2px;flex-shrink:0;"></div> 전용 자전거도로</div>
      <div class="legend-item"><div style="height:3px;width:24px;background:#f39c12;border-radius:2px;flex-shrink:0;border-top:2px dashed #f39c12;"></div> 겸용·보행자도로</div>
    </div>
  </div>
  <div id="tooltip"></div>
</div>

function drawSubway() {
  subwayLayer.clearLayers();
  SUBWAY_STATIONS.forEach(s => {

      radius: 8,
      fillColor: '#e84393',

function drawBuffers() {
  bufferLayer.clearLayers();
  SUBWAY_STATIONS.forEach(s => {
    // 500m (바깥쪽 먼저)
    L.circle([s.lat, s.lng], {

function toggleSubway() {
  showSubway = !showSubway;
  document.getElementById('btn-subway').classList.toggle('active', showSubway);

  if (showSubway) {
    drawSubway();
    subwayLayer.addTo(map);
  } else {
    map.removeLayer(subwayLayer);
  }
}

function toggleBuffer() {
  showBuffer = !showBuffer;
  document.getElementById('btn-buffer').classList.toggle('active', showBuffer);
  document.getElementById('legend-buffer').style.display = showBuffer ? 'block' : 'none';
  if (showBuffer) {
    drawBuffers();
    bufferLayer.addTo(map);
    // 버퍼 켜면 지하철역도 자동으로 표시
    if (!showSubway) toggleSubway();
  } else {
    map.removeLayer(bufferLayer);
  }
}

let currentRegion = 'gwangju';
let bubbleMode = 'total';
let showBubble = true;
let showOD = true;
let odCount = 30;

function getMax(stations, mode) {
  return Math.max(...stations.map(s => s[mode]));
}

function drawBubbles() {
  bubbleLayer.clearLayers();
  if (!showBubble) return;
  const data = REGIONS[currentRegion];
  const maxVal = getMax(data.stations, bubbleMode);
  const sorted = [...data.stations].sort((a,b) => a[bubbleMode]-b[bubbleMode]);
  sorted.forEach(s => {
    const val = s[bubbleMode];
    const r = 5 + (val/maxVal)*32;
    const circle = L.circleMarker([s.lat, s.lng], {
      radius: r,
      fillColor: '#2c7ab5',
      fillOpacity: 0.2 + (val/maxVal)*0.55,
      color: '#2c7ab5',
      weight: 1.5, opacity: 0.7
    }).addTo(bubbleLayer);
    circle.on('mouseover', () => {
      document.getElementById('tooltip').innerHTML = `
        <div class="tt-name">${s.name}</div>
        <div class="tt-row"><span>전체 이용</span><span class="tt-val">${s.total.toLocaleString()}건</span></div>
        <div class="tt-row"><span>대여</span><span class="tt-val">${s.depart.toLocaleString()}건</span></div>
        <div class="tt-row"><span>반납</span><span class="tt-val">${s.arrive.toLocaleString()}건</span></div>
      `;
      document.getElementById('tooltip').style.display = 'block';
    });
    circle.on('mousemove', e => {
      const rect = map.getContainer().getBoundingClientRect();
      const tt = document.getElementById('tooltip');
      tt.style.left = (e.originalEvent.clientX - rect.left + 14) + 'px';
      tt.style.top  = (e.originalEvent.clientY - rect.top  - 10) + 'px';
    });
    circle.on('mouseout', () => { document.getElementById('tooltip').style.display='none'; });
  });
}

function drawOD() {
  odLayer.clearLayers();
  if (!showOD) return;
  const stMap = {};
  REGIONS[currentRegion].stations.forEach(s => stMap[s.name] = s);
  const subset = REGIONS[currentRegion].od.slice(0, odCount);
  const maxC = subset[0]?.count || 1;
  subset.forEach(od => {
    const from = stMap[od.from], to = stMap[od.to];
    if (!from || !to) return;
    const t = od.count / maxC;
    const line = L.polyline([[from.lat,from.lng],[to.lat,to.lng]], {
      color: `rgb(220,${Math.round(80+t*60)},50)`,
      weight: 1 + t*5, opacity: 0.15 + t*0.65
    }).addTo(odLayer);
    line.on('mouseover', () => {
      document.getElementById('tooltip').innerHTML = `
        <div class="tt-name">이동 경로</div>
        <div class="tt-row"><span>출발</span><span class="tt-val">${od.from}</span></div>
        <div class="tt-row"><span>도착</span><span class="tt-val">${od.to}</span></div>
        <div class="tt-row"><span>이용 횟수</span><span class="tt-val">${od.count.toLocaleString()}건</span></div>
      `;
      document.getElementById('tooltip').style.display = 'block';
    });
    line.on('mousemove', e => {
      const rect = map.getContainer().getBoundingClientRect();
      const tt = document.getElementById('tooltip');
      tt.style.left = (e.originalEvent.clientX - rect.left + 14) + 'px';
      tt.style.top  = (e.originalEvent.clientY - rect.top  - 10) + 'px';
    });
    line.on('mouseout', () => { document.getElementById('tooltip').style.display='none'; });
  });
}

function updateStats() {
  const d = REGIONS[currentRegion];
  document.getElementById('stat-total').textContent = d.totalTrips.toLocaleString();
  document.getElementById('stat-stations').textContent = d.stations.length;
  document.getElementById('stat-od').textContent = odCount;

const popLayer = L.layerGroup();
let showPop = false;

const popColors = ['#fff7e6','#fdd9a0','#fdba6b','#e8854a','#c45e2a'];
const popBreaks = [0, 1000, 5000, 15000, 30000];

function getPopColor(val) {
  for (let i = popBreaks.length - 1; i >= 0; i--) {
    if (val >= popBreaks[i]) return popColors[i];
  }
  return popColors[0];
}

function drawPop() {
  popLayer.clearLayers();
  L.geoJSON(POP_GEOJSON, {
    style: function(f) {
      const val = f.properties.val || 0;
      return {
        fillColor: getPopColor(val),
        fillOpacity: 0.38,
        color: '#888',
        weight: 0.5,
        opacity: 0.6
      };
    },
    onEachFeature: function(f, layer) {
      const val = Math.round(f.properties.val || 0);
      layer.bindTooltip('인구: ' + val.toLocaleString() + '명', {
        sticky: true, className: 'pop-tooltip'
      });
    }
  }).addTo(popLayer);
}

function togglePop() {
  showPop = !showPop;
  document.getElementById('btn-pop').classList.toggle('active', showPop);
  document.getElementById('legend-pop').style.display = showPop ? 'block' : 'none';
  if (showPop) {
    drawPop();
    popLayer.addTo(map);
    popLayer.bringToBack();
  } else {
    map.removeLayer(popLayer);
  }
}

function render() {
  drawBubbles();
  drawOD();
  updateStats();
}

function switchRegion(key) {
  currentRegion = key;
  Object.keys(REGIONS).forEach(k => {
    document.getElementById('tab-'+k).classList.toggle('active', k===key);
  });
  const r = REGIONS[key];
  map.flyTo(r.center, r.zoom, {duration: 1.2});
  render();
}

function toggleLayer(type) {
  if (type==='bubble') {
    showBubble = !showBubble;
    document.getElementById('btn-bubble').classList.toggle('active', showBubble);
  } else {
    showOD = !showOD;
    document.getElementById('btn-od').classList.toggle('active', showOD);
  }
  render();
}

function setBubbleMode(mode) {
  bubbleMode = mode;
  ['total','depart','arrive'].forEach(m =>
    document.getElementById('btn-'+m).classList.toggle('active', m===mode));
  drawBubbles();
}

function updateOD(val) {
  odCount = parseInt(val);
  document.getElementById('od-val').textContent = val;
  document.getElementById('stat-od').textContent = val;
  drawOD();
}

render();

// ── 자전거도로 레이어 (Overpass API / OSM) ──────────────────
const bikeLayer = L.layerGroup();
let showBike = false;
let bikeLoaded = false;

async function fetchBikeRoads() {
  const status = document.getElementById('bike-status');
  status.textContent = '불러오는 중…';
  const query = `
[out:json][timeout:30];
(
  way["highway"="cycleway"](35.12,126.82,35.22,126.92);
  way["cycleway"~"lane|track|shared_lane"](35.12,126.82,35.22,126.92);
  way["bicycle"="designated"](35.12,126.82,35.22,126.92);
  way["highway"="path"]["bicycle"="designated"](35.12,126.82,35.22,126.92);
);
out body; >; out skel qt;
  `;
  try {
    const res = await fetch('https://overpass-api.de/api/interpreter', {
      method: 'POST',
      body: query,
      headers: {'Content-Type': 'text/plain'}
    });
    const data = await res.json();
    const nodes = {};
    data.elements.filter(e => e.type === 'node').forEach(n => { nodes[n.id] = [n.lat, n.lon]; });
    let count = 0;
    data.elements.filter(e => e.type === 'way').forEach(way => {
      const coords = (way.nodes || []).map(id => nodes[id]).filter(Boolean);
      if (coords.length < 2) return;
      const isDedicated = way.tags?.highway === 'cycleway';
      L.polyline(coords, {
        color: isDedicated ? '#2ecc71' : '#f39c12',
        weight: isDedicated ? 3.5 : 2.5,
        opacity: 0.9,
        dashArray: isDedicated ? null : '6,4'
      }).bindTooltip(
        `🚴 ${way.tags?.name || (isDedicated ? '자전거 전용도로' : '자전거 겸용도로')}`,
        {sticky: true, className: 'pop-tooltip'}
      ).addTo(bikeLayer);
      count++;
    });
    status.textContent = `${count}개 구간 로드됨`;
    bikeLoaded = true;
  } catch(e) {
    status.textContent = '로드 실패 (네트워크 확인)';
    console.error(e);
  }
}

async function toggleBikeRoads() {
  showBike = !showBike;
  document.getElementById('btn-bike').classList.toggle('active', showBike);
  document.getElementById('legend-bike').style.display = showBike ? 'block' : 'none';
  if (showBike) {
    if (!bikeLoaded) await fetchBikeRoads();
    bikeLayer.addTo(map);
  } else {
    map.removeLayer(bikeLayer);
  }
}
