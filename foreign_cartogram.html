const NAT = 56.5;


document.getElementById('leg-avg').textContent = `전국 평균 남성 비율: ${NAT}%`;

function getColor(malePct) {
  const diff = malePct - NAT;
  const t = Math.max(-1, Math.min(1, diff / 25));
  const lerp = (a,b,t) => Math.round(a+(b-a)*t);
  if (t >= 0) return `rgb(${lerp(220,42,t)},${lerp(220,95,t)},${lerp(220,168,t)})`;
  const a = -t;
  return `rgb(${lerp(220,184,a)},${lerp(220,64,a)},${lerp(220,64,a)})`;
}

const VW = 960, VH = 700;
const maxTotal = Math.max(...DATA.map(d=>d.total));
function rScale(total) { return Math.sqrt(total/maxTotal) * 36; }

// gx: 260~450 → 40~760, gy: 124~326 → 40~545
const scaleX = d3.scaleLinear().domain([260,450]).range([50, VW-50]);
const scaleY = d3.scaleLinear().domain([124,326]).range([50, VH-50]);

const nodes = DATA.map(d => ({
  ...d,
  x: scaleX(d.gx),
  y: scaleY(d.gy),
  r: rScale(d.total)
}));

const sim = d3.forceSimulation(nodes)
  .force('x', d3.forceX(d => scaleX(d.gx)).strength(0.45))
  .force('y', d3.forceY(d => scaleY(d.gy)).strength(0.45))
  .force('collide', d3.forceCollide(d => d.r + 0.3).strength(1).iterations(12))
  .stop();

for (let i=0; i<800; i++) sim.tick();

nodes.forEach(d => {
  d.x = Math.max(d.r+4, Math.min(VW-d.r-4, d.x));
  d.y = Math.max(d.r+4, Math.min(VH-d.r-4, d.y));
});

const svg = d3.select('#carto').append('svg')
  .attr('viewBox', '0 0 960 700')
  .attr('width', '100%')
  .style('max-width', '960px')
  .style('display', 'block')
  .style('margin', '0 auto');
const W = VW, H = VH;

const tt = document.getElementById('tt');
const carto = document.getElementById('carto');

const nodeG = svg.selectAll('g').data(nodes).join('g')
  .attr('transform', d=>`translate(${d.x},${d.y})`)
  .style('cursor','pointer');

nodeG.append('circle')
  .attr('r', d=>d.r)
  .attr('fill', d=>getColor(d.malePct))
  .attr('fill-opacity', 0.82)
  .attr('stroke', 'white')
  .attr('stroke-width', 0.8);

// 큰 원에만 지역명 표시
nodeG.filter(d=>d.r>14).append('text')
  .text(d=>d.name)
  .attr('text-anchor','middle').attr('dominant-baseline','central')
  .attr('font-size', d=>d.r>22?'10px':'8px')
  .attr('fill', d=>d.malePct>NAT?'#E8F0FC':'#FCEAEA')
  .attr('font-weight','500')
  .attr('font-family','Noto Sans KR')
  .style('pointer-events','none');

nodeG.on('mouseover', function(e,d) {
  d3.select(this).select('circle').attr('stroke','#444').attr('stroke-width',2);
  const diff = (d.malePct-NAT).toFixed(1);
  tt.style.opacity=1;
  tt.innerHTML=`<strong style="font-size:13px">${d.name}</strong><br>
    외국인 ${d.total.toLocaleString()}명<br>
    <span style="color:#2A5FA8">남성 ${d.male.toLocaleString()}명 (${d.malePct}%)</span><br>
    <span style="color:#B84040">여성 ${d.female.toLocaleString()}명 (${(100-d.malePct).toFixed(1)}%)</span><br>
    전국 평균 대비 <strong>${diff>0?'+':''}${diff}%p</strong>`;
}).on('mousemove', e=>{
  const rect = carto.getBoundingClientRect();
  tt.style.left=(e.clientX-rect.left+14)+'px';
  tt.style.top=(e.clientY-rect.top-60)+'px';
}).on('mouseout', function(){
  d3.select(this).select('circle').attr('stroke','white').attr('stroke-width',0.8);
  tt.style.opacity=0;
});
</script>
</body>
</html>
