const R_VAL = -0.93;
const N = 264;
const SLOPE = -0.9163;
const INTERCEPT = 60.3727;
const LABELS = ["마포구", "세종시", "강남구", "남해군", "관악구", "서초구", "유성구", "고흥군", "합천군", "동작구", "울릉군", "과천시", "의성군", "화성시"];


const TYPES = [
  { key: '서울 자치구',      label: '서울 자치구',        color: '#0D3B7A', size: 6.5 },
  { key: '광역시·수도권 구', label: '광역시·수도권 자치구', color: '#5BA3D9', size: 5.5 },
  { key: '시',              label: '중소도시·시',         color: '#AAAAAA', size: 4.8 },
  { key: '군',              label: '군 지역 (농촌)',      color: '#C42B2B', size: 6.0 },
];
const colorMap = Object.fromEntries(TYPES.map(t=>[t.key, t.color]));
const sizeMap  = Object.fromEntries(TYPES.map(t=>[t.key, t.size]));
const LABEL_SET = new Set(LABELS);

// 활성 타입 상태
const active = new Set();  // 초기: 선택 없음 = 전부 정지

// 범례 버튼
const legendEl = document.getElementById('legend');
TYPES.forEach(t => {
  const btn = document.createElement('div');
  btn.className = 'legend-btn inactive';
  btn.dataset.key = t.key;
  btn.style.borderColor = t.color;
  btn.style.color = t.color;
  btn.innerHTML = `<div class="dot" style="background:${t.color};opacity:0.5"></div>${t.label}`;
  btn.addEventListener('click', () => toggleType(t.key, btn));
  legendEl.appendChild(btn);
});

function toggleType(key, btn) {
  if (active.has(key)) {
    active.delete(key);
    btn.classList.remove('active');
    btn.classList.add('inactive');
  } else {
    active.add(key);
    btn.classList.remove('inactive');
    btn.classList.add('active');
    btn.style.background = colorMap[key];
    btn.style.borderColor = colorMap[key];
  }
  updateChart();
}

// 차트
const W = document.getElementById('chart').clientWidth || 860;
const H = Math.round(W * 0.82);
const margin = { top: 20, right: 30, bottom: 54, left: 60 };
const w = W - margin.left - margin.right;
const h = H - margin.top - margin.bottom;

const svg = d3.select('#chart').append('svg')
  .attr('width', W).attr('height', H);
const g = svg.append('g')
  .attr('transform', `translate(${margin.left},${margin.top})`);

const x = d3.scaleLinear().domain([0,70]).range([0,w]);
const y = d3.scaleLinear().domain([0,70]).range([h,0]);

// 테두리: 아래·왼쪽만
g.append('line').attr('x1',0).attr('y1',h).attr('x2',w).attr('y2',h)
  .attr('stroke','#CCCCCC').attr('stroke-width',0.8);
g.append('line').attr('x1',0).attr('y1',0).attr('x2',0).attr('y2',h)
  .attr('stroke','#CCCCCC').attr('stroke-width',0.8);

// 추세선
g.append('line')
  .attr('x1',x(0)).attr('y1',y(INTERCEPT))
  .attr('x2',x(65)).attr('y2',y(SLOPE*65+INTERCEPT))
  .attr('stroke','#CCCCCC').attr('stroke-width',1.3)
  .attr('stroke-dasharray','5 4');

// 축
g.append('g').attr('transform',`translate(0,${h})`)
  .call(d3.axisBottom(x).ticks(7).tickFormat(d=>d+'%').tickSize(4))
  .call(g=>g.select('.domain').remove())
  .call(g=>g.selectAll('text').attr('font-size','10px').attr('fill','#999')
    .attr('font-family','Noto Sans KR'));
g.append('g')
  .call(d3.axisLeft(y).ticks(7).tickFormat(d=>d+'%').tickSize(4))
  .call(g=>g.select('.domain').remove())
  .call(g=>g.selectAll('text').attr('font-size','10px').attr('fill','#999')
    .attr('font-family','Noto Sans KR'));

// 축 레이블
g.append('text').attr('x',w/2).attr('y',h+44)
  .attr('text-anchor','middle').attr('font-size','11px').attr('fill','#666')
  .attr('font-family','Noto Sans KR').text('청년(20–39세) 1인가구 비율 (%)');
g.append('text').attr('transform','rotate(-90)')
  .attr('x',-h/2).attr('y',-46)
  .attr('text-anchor','middle').attr('font-size','11px').attr('fill','#666')
  .attr('font-family','Noto Sans KR').text('노년(65세 이상) 1인가구 비율 (%)');

// 주석
g.append('text').attr('x',x(5)).attr('y',y(63.5))
  .attr('font-size','9.5px').attr('fill','#C42B2B').attr('font-weight','700')
  .attr('font-family','Noto Sans KR').text('노년 집중');
g.append('text').attr('x',x(5)).attr('y',y(60.5))
  .attr('font-size','8.5px').attr('fill','#C42B2B').attr('opacity',0.8)
  .attr('font-family','Noto Sans KR').text('(농촌·군 지역)');
g.append('text').attr('x',x(53)).attr('y',y(7.5))
  .attr('font-size','9.5px').attr('fill','#0D3B7A').attr('font-weight','700')
  .attr('font-family','Noto Sans KR').text('청년 집중');
g.append('text').attr('x',x(53)).attr('y',y(4.5))
  .attr('font-size','8.5px').attr('fill','#0D3B7A').attr('opacity',0.8)
  .attr('font-family','Noto Sans KR').text('(대학가·도심)');

// 상관계수 박스
const rbox = document.getElementById('rbox');
rbox.style.top  = (margin.top+4)+'px';
rbox.style.right = (margin.right+4)+'px';
rbox.innerHTML = `상관계수 r = ${R_VAL}<br><span style="font-size:9px;color:#BBB">(${N}개 시군구)</span>`;

// 점 레이어
const tt = document.getElementById('tt');
const typeOrder = ['시','광역시·수도권 구','군','서울 자치구'];
const sorted = [...DATA].sort((a,b)=>typeOrder.indexOf(a.type)-typeOrder.indexOf(b.type));

const circles = g.selectAll('circle').data(sorted).join('circle')
  .attr('cx', d=>x(d.youngPct))
  .attr('cy', d=>y(d.oldPct))
  .attr('r',  d=>sizeMap[d.type])
  .attr('fill', d=>colorMap[d.type])
  .attr('stroke','white').attr('stroke-width',0.7)
  .style('cursor','pointer')
  .on('mouseover', function(e,d){
    if(!active.has(d.type)) return;
    d3.select(this).attr('r', sizeMap[d.type]*1.5).attr('stroke-width',1.5);
    tt.style.opacity=1;
    tt.innerHTML=`<strong style="font-size:13px">${d.name}</strong><br>
      <span style="color:${colorMap[d.type]}">${d.type}</span><br>
      청년 비율: <strong>${d.youngPct}%</strong><br>
      노년 비율: <strong>${d.oldPct}%</strong><br>
      1인가구 총수: <strong>${d.total.toLocaleString()}명</strong>`;
  })
  .on('mousemove', e=>{
    tt.style.left=(e.clientX+14)+'px';
    tt.style.top=(e.clientY-50)+'px';
  })
  .on('mouseout', function(e,d){
    d3.select(this).attr('r',sizeMap[d.type]).attr('stroke-width',0.7);
    tt.style.opacity=0;
  });

// 라벨 레이어
const labelOffsets = {
  '관악구':[ 0.8,-3.8],'유성구':[ 0.8,-3.8],'마포구':[-6.0, 0.5],
  '동작구':[ 0.8, 1.2],'서초구':[-6.0, 0.5],'강남구':[ 0.8,-3.8],
  '고흥군':[ 0.8, 1.2],'합천군':[-6.5, 0.5],'의성군':[-6.0,-3.8],
  '남해군':[ 0.8, 1.2],'세종시':[ 0.8, 1.2],'화성시':[ 0.8,-3.8],
  '과천시':[ 0.8, 1.2],'울릉군':[ 0.8, 1.2],
};

const labelData = DATA.filter(d=>LABEL_SET.has(d.name));

const labelTexts = g.selectAll('text.lbl').data(labelData).join('text')
  .attr('class','lbl')
  .attr('x', d=>{ const [dx]=labelOffsets[d.name]||[0.8]; return x(d.youngPct+dx); })
  .attr('y', d=>{ const [,dy]=labelOffsets[d.name]||[0,1.2]; return y(d.oldPct+dy); })
  .attr('font-size','8.5px').attr('font-weight','700')
  .attr('font-family','Noto Sans KR')
  .attr('fill', d=>colorMap[d.type])
  .text(d=>d.name);

function updateChart() {
  const none = active.size === 0;  // 선택 없음 = 초기 상태

  circles
    .classed('dot-blink', d => !none && active.has(d.type))
    .attr('fill-opacity', d => none ? 0.82 : (active.has(d.type) ? 0.85 : 0.08))
    .attr('stroke-opacity', d => none ? 1 : (active.has(d.type) ? 1 : 0.05));

  labelTexts
    .attr('fill-opacity', d => none ? 1 : (active.has(d.type) ? 1 : 0.06));
}

updateChart();
</script>
