  ["산청군",35.415,127.874,1260,45.0],
  ["함양군",35.521,127.726,818,54.0],
  ["거창군",35.687,127.91,1264,53.6],
  ["합천군",35.567,128.166,1254,59.1],
  ["제주시",33.499,126.531,20355,57.9],
  ["서귀포시",33.254,126.56,10156,65.9]
];
// 남성 비율 → 색상
// 50% = 중립(회색), 낮을수록 핑크(여성), 높을수록 파랑(남성)
function maleColor(pct) {
  const t = (pct - 56.5) / 28; // -1(여성) ~ +1(남성) 정규화
  const c = Math.max(-1, Math.min(1, t));
  const lerp = (a,b,t) => Math.round(a+(b-a)*t);
  if (c >= 0) {
    return `rgb(${lerp(220,46,c)},${lerp(220,95,c)},${lerp(220,168,c)})`;
  } else {
    const a = -c;
    return `rgb(${lerp(220,192,a)},${lerp(220,64,a)},${lerp(220,128,a)})`;
  }
}

// 총수 → 반지름
const maxTotal = Math.max(...DATA.map(d=>d[3]));
function radius(total) { return 2 + Math.sqrt(total/maxTotal)*10; }

// 지도
const map = L.map('map',{center:[36.5,127.8],zoom:7});
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{
  attribution:'© OpenStreetMap © CARTO',
  subdomains:'abcd', maxZoom:19
}).addTo(map);

const AVG_MALE = 56.5; // 전국 외국인 평균 남성 비율

DATA.forEach(([name,lat,lon,total,male_pct]) => {
  const female_pct = (100 - male_pct).toFixed(1);
  const color = maleColor(male_pct);
  const r = radius(total);

  const circle = L.circleMarker([lat,lon],{
    radius: r,
    fillColor: color,
    fillOpacity: 0.83,
    color: 'white',
    weight: 0.7,
  }).addTo(map);

  // 유형 판단
  let type='';
  if (male_pct >= 75) type='<span style="color:#2E5FA8;font-weight:600">제조업·어업 외국인 노동자 집중</span>';
  else if (male_pct >= 60) type='<span style="color:#588ECE;font-weight:600">남성 외국인 우세 (노동 중심)</span>';
  else if (male_pct >= 50) type='<span style="color:#888">남녀 혼재 (약간 남성 우세)</span>';
  else if (male_pct >= 40) type='<span style="color:#C06090">남녀 혼재 (약간 여성 우세)</span>';
  else type='<span style="color:#C04080;font-weight:600">여성 우세 (결혼이민·유학 중심)</span>';

  const diff = (male_pct - AVG_MALE).toFixed(1);
  const diffStr = diff > 0 ? `+${diff}%p` : `${diff}%p`;

  circle.bindPopup(`
    <div style="font-family:'Noto Sans KR',sans-serif;min-width:180px">
      <div style="font-size:14px;font-weight:700;margin-bottom:4px">${name}</div>
      <div style="font-size:10px;margin-bottom:8px">${type}</div>
      <div style="font-size:12px;line-height:2">
        <span style="color:#2E5FA8">● 남성</span> <strong>${male_pct}%</strong><br>
        <span style="color:#C04080">● 여성</span> <strong>${female_pct}%</strong><br>
        <span style="color:#666">● 외국인 총수</span> <strong>${total.toLocaleString()}명</strong><br>
        <span style="color:#999;font-size:10px">전국 평균(${AVG_MALE}%) 대비 ${diffStr}</span>
      </div>
    </div>`,{maxWidth:230});
});

// 범례
const legend = L.control({position:'bottomright'});
legend.onAdd = function() {
  const div = L.DomUtil.create('div','legend');
  div.innerHTML = `
    <h4>외국인 남녀 비율</h4>
    <div class="legend-bar"></div>
    <div class="legend-labels"><span>여성 우세<br>(결혼이민·유학)</span><span>남성 우세<br>(제조·어업)</span></div>
    <div class="legend-mid">← 전국 평균 56.5% →</div>
    <div class="legend-size">
      <svg width="64" height="20">
        <circle cx="6"  cy="10" r="3.5" fill="#999" opacity=".7"/>
        <circle cx="22" cy="10" r="7"   fill="#999" opacity=".7"/>
        <circle cx="46" cy="10" r="12"  fill="#999" opacity=".7"/>
      </svg>
      <span>외국인 총수</span>
    </div>
    <div class="legend-note">출처: 행정안전부 외국인주민현황 (2024)</div>`;
  return div;
};
legend.addTo(map);
</script>
</body>
</html>
