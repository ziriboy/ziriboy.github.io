<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>지역이 음식을 만들고, 음식이 지역을 만든다</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700;900&family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    :root {
      --bg: #ffffff;
      --surface: #ffffff;
      --navy: #1c2b3a;
      --navy-light: #2c3f52;
      --gold: #b8922a;
      --gold-light: #e8c96a;
      --ink: #2a3240;
      --ink-mid: #5a6472;
      --ink-soft: #8a96a4;
      --border: #e0e0e0;
      --border-light: #e8e8e8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #ffffff;
      color: var(--ink);
      font-family: 'Noto Sans KR', sans-serif;
      font-weight: 400;
    }
    input, textarea { outline: none; font-family: 'Noto Sans KR', sans-serif; }

    @keyframes fadeUp { from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);} }
    .fade-up { animation: fadeUp 0.5s cubic-bezier(0.16,1,0.3,1) forwards; }
    @keyframes slideDown { from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);} }
    .slide-down { animation: slideDown 0.25s ease forwards; }

    textarea::-webkit-scrollbar { width: 3px; }
    textarea::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .card-hover { transition: box-shadow 0.2s, transform 0.2s; }
    .card-hover:hover { box-shadow: 0 4px 20px rgba(28,43,58,0.12); transform: translateY(-1px); }

    .upload-zone { transition: all 0.2s; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
    .upload-zone:hover { border-color: var(--navy) !important; background: #f0ede6 !important; }

    button { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
    /* iOS에서 input focus 시 자동 확대 방지 */
    input, textarea { -webkit-appearance: none; }

    @media print {
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
      body { background: #fff !important; }
      .no-print { display: none !important; }
      #infographic-root {
        width: 210mm; max-width: 210mm; margin: 0 auto;
        border: none !important; box-shadow: none !important; border-radius: 0 !important;
      }
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

// ─── 데이터 ───────────────────────────────────────────────────
const CHAR_LIMIT = 120;
const LS_KEY = 'food-place-v10d';
const EMOJI_OPTIONS = ["🍊","🦪","🍵","🦀","🍜","🌾","🥬","🐟","🍖","🍚","🥩","🌽","🍇","🍎","🦑","🎋","🥕","🫚"];

const PRESET_CARDS = [
  { region:"제주",   food:"감귤",  color:"#c07a10", light:"#d89530", emoji:"🍊" },
  { region:"통영",   food:"굴",    color:"#1a5570", light:"#256890", emoji:"🦪" },
  { region:"보성",   food:"녹차",  color:"#2a6835", light:"#358045", emoji:"🍵" },
  { region:"영덕",   food:"대게",  color:"#7a2c0e", light:"#9a3e18", emoji:"🦀" },
  { region:"동해안", food:"막국수",color:"#3d2670", light:"#5a3a90", emoji:"🍜" },
];
const CUSTOM_IDX = 5;

const SLOTS = [
  {
    label:"자연환경",
    sub:"기후 · 지형 · 토양",
    hint:"기후, 지형, 토양 등 자연환경의 특성이 이 음식의 탄생에 어떻게 기여했나요?",
    section:"place",
    examples:{
      "제주-감귤":{caption:"아열대성 기후, 현무암 토양, 연평균 15°C 이상의 온난한 겨울이 감귤 재배의 자연적 기반", imgHint:"제주 과수원·한라산 배경"},
      "동해안-막국수":{caption:"고랭지의 서늘한 기후와 큰 일교차, 척박한 화강암 토양에서 메밀이 자라는 환경", imgHint:"강원도 메밀밭·산간 풍경"},
    }
  },
  {
    label:"식재료 생산",
    sub:"농업 · 어업 · 산업",
    hint:"자연환경은 어떤 식재료 생산을 가능하게 했으며, 그 규모와 특성은 어떠한가요?",
    section:"place",
    examples:{
      "제주-감귤":{caption:"제주 전역에 분포하는 감귤 과수원, 한라봉·천혜향 등 품종 다양화와 대규모 재배", imgHint:"감귤 수확·과수원 열매"},
      "동해안-막국수":{caption:"서늘한 기후에 강한 메밀이 강원도 대표 곡물로 자리잡아 지역 식재료 공급의 근간 형성", imgHint:"메밀 꽃밭·수확 현장"},
    }
  },
  {
    label:"음식 문화 & 소비",
    sub:"음식 · 시장 · 소비 패턴",
    hint:"어떤 음식이 발달했고, 지역 주민과 관광객의 소비 문화는 어떻게 형성되었나요?",
    section:"food",
    examples:{
      "제주-감귤":{caption:"감귤 생과즙·가공식품 산업 성장, 관광객 필수 기념품으로 소비되며 연간 수백억 원 규모 시장 형성", imgHint:"감귤 음식·관광 상품"},
      "동해안-막국수":{caption:"메밀 막국수·들기름 막국수가 강원도 대표 향토 음식으로 자리잡아 연중 관광객 유입의 핵심 요인", imgHint:"막국수 음식 사진"},
    }
  },
  {
    label:"지역경관 변화",
    sub:"지역경관 · 관광 · 경제",
    hint:"음식 산업이 지역의 경관, 관광 인프라, 경제(소득·소비·산업)에 어떤 변화를 가져왔나요?",
    section:"food",
    examples:{
      "제주-감귤":{caption:"감귤 체험 농장·드라이브 코스·감귤박물관 조성, 농업관광(agritourism) 통해 지역 소득 다각화", imgHint:"감귤 체험 농장·경관"},
      "동해안-막국수":{caption:"봉평 메밀꽃밭 관광지·효석문화제·막국수 거리 형성으로 지역 관광 경제 견인 및 인구 유입 효과", imgHint:"봉평 메밀꽃밭·막국수 거리"},
    }
  },
];

// ─── 유틸 ────────────────────────────────────────────────────
function saveLS(s){ try{ localStorage.setItem(LS_KEY,JSON.stringify(s)); }catch(e){} }
function loadLS(){ try{ const s=localStorage.getItem(LS_KEY); return s?JSON.parse(s):null; }catch(e){return null;} }

// ─── 개념 소개 ──────────────────────────────────────────────
function ConceptIntro() {
  const [open, setOpen] = React.useState(false);
  return (
    <div style={{
      border:`1px solid var(--border)`, borderRadius:4,
      marginBottom:24, overflow:"hidden", background:"var(--surface)"
    }}>
      <button onClick={()=>setOpen(!open)} style={{
        width:"100%", padding:"12px 18px", background:"none", border:"none",
        display:"flex", justifyContent:"space-between", alignItems:"center",
        cursor:"pointer", fontFamily:"inherit"
      }}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:3,height:16,background:"var(--gold)",borderRadius:2}}/>
          <span style={{fontSize:13,fontWeight:700,color:"var(--navy)",letterSpacing:"0.05em"}}>탐구 개념 안내</span>
          <span style={{fontSize:12,color:"var(--ink-soft)",fontWeight:400}}>지역과 음식의 상호 형성 관계</span>
        </div>
        <span style={{color:"var(--ink-soft)",fontSize:12,transform:open?"rotate(180deg)":"none",display:"inline-block",transition:"transform 0.2s"}}>▼</span>
      </button>
      {open && (
        <div className="slide-down" style={{padding:"0 18px 18px",borderTop:`1px solid var(--border-light)`}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginTop:16}}>
            {[
              {
                tag:"Place  →  Food", tagColor:"#b8922a",
                title:"자연환경이 음식을 만든다",
                body:"기후·지형·토양 같은 자연환경은 특정 식재료와 조리법이 발전하는 토대를 제공합니다. 스페인 남부의 건조한 기후가 올리브 오일 문화를 만들고, 통영의 리아스식 해안이 굴 양식을 가능하게 한 것처럼, 환경이 먼저 음식을 결정합니다."
              },
              {
                tag:"Food  →  Place", tagColor:"#7a4a2a",
                title:"음식이 지역을 만든다",
                body:"반대로, 특정 음식이 지역의 경관·경제·정체성을 재구성합니다. 춘천의 닭갈비 골목, 통영의 굴 시장처럼 음식이 거리·관광·고용·소득 구조 전체를 바꾸어 놓습니다. 음식이 지역 브랜드가 되어 사람과 자본을 끌어들입니다."
              }
            ].map((item,i)=>(
              <div key={i} style={{borderLeft:`3px solid ${item.tagColor}`,paddingLeft:12}}>
                <div style={{fontSize:11,fontWeight:700,letterSpacing:"0.12em",color:item.tagColor,marginBottom:5,fontFamily:"'Noto Serif KR'"}}>
                  {item.tag}
                </div>
                <div style={{fontSize:13,fontWeight:700,color:"var(--navy)",marginBottom:6}}>{item.title}</div>
                <div style={{fontSize:12,color:"var(--ink-mid)",lineHeight:1.8}}>{item.body}</div>
              </div>
            ))}
          </div>
          <div style={{marginTop:14,padding:"10px 14px",background:"#f5f5f5",borderRadius:3,fontSize:12,color:"var(--ink-mid)",lineHeight:1.8}}>
            <strong style={{color:"var(--navy)"}}>탐구 목표:</strong> 선택한 지역·음식 사례에서 두 방향의 인과관계를 사진과 설명으로 표현하고, 하나의 완성된 탐구 결과물로 종합합니다.
          </div>
        </div>
      )}
    </div>
  );
}

// ─── 섹션 레이블 ─────────────────────────────────────────────
function SectionLabel({ text, direction }) {
  const isPlace = direction === "place";
  return (
    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
      <div style={{
        fontSize:11, fontWeight:700, letterSpacing:"0.12em",
        color: isPlace?"#9a7218":"#7a3818",
        fontFamily:"'Noto Serif KR'",
        padding:"3px 10px",
        border:`1px solid ${isPlace?"#d4aa40":"#c06030"}`,
        borderRadius:2
      }}>
        {isPlace?"PLACE → FOOD":"FOOD → PLACE"}
      </div>
      <div style={{flex:1, height:1, background:"var(--border)"}}/>
      <div style={{fontSize:12,color:"var(--ink-soft)"}}>{text}</div>
    </div>
  );
}

// ─── iOS 감지 유틸 ──────────────────────────────────────────
const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent)
  || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

// ─── 업로드 슬롯 ─────────────────────────────────────────────
function Slot({ slot, caption, imgSrc, cardColor, onCaptionChange, onImgChange, exampleKey }) {
  const fileRef   = React.useRef();
  const zoneRef   = React.useRef();
  const [drag,      setDrag]      = React.useState(false);
  const [showHint,  setShowHint]  = React.useState(false);
  const charCount = caption.length;
  const isNear = charCount >= CHAR_LIMIT * 0.8;
  const isOver = charCount >= CHAR_LIMIT;
  const ex = slot.examples[exampleKey];

  function handleFile(file) {
    if (!file || !file.type.startsWith("image/")) return;
    const reader = new FileReader();
    reader.onload = e => onImgChange(e.target.result);
    reader.readAsDataURL(file);
  }

  function handlePaste(e) {
    const items = e.clipboardData && e.clipboardData.items;
    if (!items) return;
    for (let i = 0; i < items.length; i++) {
      if (items[i].type.startsWith("image/")) {
        e.preventDefault();
        handleFile(items[i].getAsFile());
        return;
      }
    }
  }

  // 데스크톱: 영역 포커스 후 Ctrl+V 감지
  React.useEffect(() => {
    if (isIOS) return;
    const el = zoneRef.current;
    if (!el) return;
    el.addEventListener("paste", handlePaste);
    return () => el.removeEventListener("paste", handlePaste);
  }, []);

  // 업로드 영역 클릭 → 파일 선택창 (iPad 포함)
  function handleZoneClick(e) {
    fileRef.current.click();
  }

  return (
    <div style={{flex:"1 1 155px",minWidth:145,maxWidth:215}}>
      {/* 이미지 업로드 */}
      <div
        ref={zoneRef}
        className="upload-zone"
        onClick={handleZoneClick}
        onKeyDown={e=>{if(e.key==="Enter"||e.key===" ")fileRef.current.click();}}
        onDragOver={e=>{if(!isIOS){e.preventDefault();setDrag(true);}}}
        onDragLeave={()=>setDrag(false)}
        onDrop={e=>{if(!isIOS){e.preventDefault();setDrag(false);handleFile(e.dataTransfer.files[0]);}}}
        onPaste={handlePaste}
        style={{
          width:"100%",aspectRatio:"1",
          background:drag?"#e0eeff":(imgSrc?"transparent":"var(--surface)"),
          border:`1.5px dashed ${drag?"var(--navy)":(imgSrc?cardColor:"var(--border)")}`,
          borderRadius:4,display:"flex",flexDirection:"column",
          alignItems:"center",justifyContent:"center",
          cursor:"pointer",overflow:"hidden",position:"relative",
          marginBottom:8,
          transition:"border-color 0.2s, background 0.2s"
        }}>
        {imgSrc ? (
          <>
            <img src={imgSrc} style={{width:"100%",height:"100%",objectFit:"cover"}} alt={slot.label}/>
            {/* 데스크톱: hover 오버레이 */}
            {!isIOS && (
              <div style={{
                position:"absolute",inset:0,background:"rgba(28,43,58,0)",
                display:"flex",alignItems:"center",justifyContent:"center",
                fontSize:12,color:"transparent",transition:"all 0.2s",
                letterSpacing:"0.05em",fontWeight:600
              }}
                onMouseEnter={e=>{e.currentTarget.style.background="rgba(28,43,58,0.55)";e.currentTarget.style.color="#fff";}}
                onMouseLeave={e=>{e.currentTarget.style.background="rgba(28,43,58,0)";e.currentTarget.style.color="transparent";}}>
                사진 교체
              </div>
            )}
          </>
        ) : (
          <div style={{textAlign:"center",padding:"12px 8px"}}>
            <div style={{fontSize:11,color:"var(--ink-soft)",lineHeight:1.8}}>
              <div style={{marginBottom:4}}>{isIOS ? "📷 탭하여 사진 선택" : "📁 클릭하여 업로드"}</div>
              {!isIOS && <div style={{fontSize:10,color:"var(--ink-soft)",opacity:0.75}}>또는 클릭 후 Ctrl+V</div>}
              {!isIOS && <div style={{fontSize:10,color:"var(--ink-soft)",opacity:0.75}}>드래그 앤 드롭</div>}
            </div>
          </div>
        )}
        <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={e=>handleFile(e.target.files[0])}/>
      </div>

      {imgSrc && (
        <button onClick={e=>{e.stopPropagation();onImgChange(null);}}
          style={{display:"block",width:"100%",background:"none",border:"1px solid #d0c8bc",
            color:"var(--ink-soft)",borderRadius:2,fontSize:11,padding:"3px",cursor:"pointer",
            fontFamily:"inherit",marginBottom:6,letterSpacing:"0.05em"}}>
          삭제
        </button>
      )}

      {/* 레이블 */}
      <div style={{display:"flex",alignItems:"baseline",justifyContent:"space-between",marginBottom:3}}>
        <div style={{fontSize:13,fontWeight:700,color:"var(--navy)"}}>{slot.label}</div>
        <button onClick={e=>{e.stopPropagation();setShowHint(!showHint);}}
          style={{background:"none",border:"none",color:"var(--ink-soft)",cursor:"pointer",
            fontSize:12,padding:0,fontFamily:"inherit",letterSpacing:"0.05em"}}>
          {showHint?"닫기":"?"}
        </button>
      </div>
      <div style={{fontSize:11,color:"var(--ink-soft)",marginBottom:6}}>{slot.sub}</div>

      {showHint && (
        <div className="slide-down" style={{
          background:"#f5f5f5",border:"1px solid var(--border)",borderRadius:3,
          padding:"8px 10px",fontSize:11,color:"var(--ink-mid)",lineHeight:1.8,marginBottom:8
        }}>
          <div style={{fontWeight:700,marginBottom:4,color:"var(--navy)"}}>{slot.hint}</div>
          {ex && <>
            {ex.imgHint && <div><span style={{fontWeight:600}}>사진 예</span>: {ex.imgHint}</div>}
            <div style={{marginTop:3}}><span style={{fontWeight:600}}>설명 예</span>: {ex.caption}</div>
          </>}
        </div>
      )}

      {/* 텍스트 입력 */}
      <textarea rows={3} maxLength={CHAR_LIMIT} value={caption}
        placeholder="설명을 입력하세요."
        onChange={e=>onCaptionChange(e.target.value)}
        style={{
          width:"100%",background:"var(--surface)",
          border:`1px solid ${isOver?"#c04040":isNear?"#b89030":"var(--border)"}`,
          borderRadius:3,color:"var(--ink)",fontSize:12,padding:"7px 9px",
          resize:"none",lineHeight:1.7,transition:"border-color 0.2s"
        }}/>
      <div style={{fontSize:11,textAlign:"right",color:isOver?"#c04040":isNear?"#9a7020":"var(--ink-soft)",marginTop:2}}>
        {charCount} / {CHAR_LIMIT}
      </div>
    </div>
  );
}

// ─── 직접 입력 카드 폼 ──────────────────────────────────────
function CustomCardForm({ custom, onChange }) {
  return (
    <div className="slide-down" style={{
      background:"var(--surface)",border:"1px solid var(--border)",
      borderRadius:4,padding:"14px 16px",marginTop:12
    }}>
      <div style={{fontSize:12,fontWeight:700,color:"var(--navy)",letterSpacing:"0.06em",marginBottom:12}}>직접 입력 카드 설정</div>
      <div style={{display:"flex",gap:12,flexWrap:"wrap",alignItems:"flex-end"}}>
        <div style={{flex:2,minWidth:100}}>
          <div style={{fontSize:11,color:"var(--ink-soft)",marginBottom:5,letterSpacing:"0.05em"}}>지역명</div>
          <input value={custom.region} onChange={e=>onChange({...custom,region:e.target.value})}
            placeholder="예) 제주" maxLength={10}
            style={{width:"100%",background:"#fff",border:"1px solid var(--border)",borderRadius:3,padding:"7px 10px",fontSize:14,color:"var(--ink)"}}/>
        </div>
        <div style={{flex:2,minWidth:100}}>
          <div style={{fontSize:11,color:"var(--ink-soft)",marginBottom:5,letterSpacing:"0.05em"}}>대표 음식</div>
          <input value={custom.food} onChange={e=>onChange({...custom,food:e.target.value})}
            placeholder="예) 감귤" maxLength={10}
            style={{width:"100%",background:"#fff",border:"1px solid var(--border)",borderRadius:3,padding:"7px 10px",fontSize:14,color:"var(--ink)"}}/>
        </div>
        <div style={{flex:3,minWidth:160}}>
          <div style={{fontSize:11,color:"var(--ink-soft)",marginBottom:5,letterSpacing:"0.05em"}}>이모지</div>
          <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
            {EMOJI_OPTIONS.map(em=>(
              <span key={em} onClick={()=>onChange({...custom,emoji:em})}
                style={{
                  fontSize:16,cursor:"pointer",padding:"2px 4px",borderRadius:3,
                  background:custom.emoji===em?"var(--navy)":"transparent",
                  border:custom.emoji===em?"1px solid var(--navy)":"1px solid var(--border-light)",
                  transition:"all 0.15s"
                }}>{em}</span>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── 학생 정보 (인포그래픽 내부용) ──────────────────────────
function StudentInfoBar({ info, card }) {
  if (!info.name && !info.classInfo && !info.group) return null;
  return (
    <div style={{
      padding:"10px 22px",
      background:"#fff",
      borderBottom:`1px solid var(--border-light)`,
      display:"flex",alignItems:"center",gap:20
    }}>
      {[
        {label:"이름",  val:info.name},
        {label:"학년/반/번호", val:info.classInfo},
        {label:"모둠",  val:info.group},
      ].filter(f=>f.val).map((f,i)=>(
        <div key={i} style={{display:"flex",alignItems:"baseline",gap:6}}>
          <span style={{fontSize:10,color:"var(--ink-soft)",letterSpacing:"0.06em",fontWeight:600}}>{f.label}</span>
          <span style={{fontSize:14,fontWeight:600,color:"var(--navy)"}}>{f.val}</span>
        </div>
      ))}
    </div>
  );
}

// ─── 인포그래픽 ─────────────────────────────────────────────
function Infographic({ card, captions, imgSrcs, studentInfo, summary, onBack }) {
  const [exporting, setExporting] = React.useState(false);
  const dateStr = new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric'});
  const IMG_SIZE = 130;

  async function downloadImage(format) {
    setExporting(true);
    await new Promise(r=>setTimeout(r,100));
    try {
      const el = document.getElementById("infographic-root");
      const canvas = await html2canvas(el, {
        scale: 2, useCORS: true, backgroundColor: "#ffffff",
        logging: false
      });
      const dataURL = format === "png"
        ? canvas.toDataURL("image/png")
        : canvas.toDataURL("image/jpeg", 0.92);

      if (isIOS) {
        // iOS Safari: link.click() 다운로드 미지원 → 새 탭에서 이미지 열기
        const win = window.open("", "_blank");
        if (win) {
          win.document.write(`
            <html><head><meta charset="UTF-8">
            <meta name="viewport" content="width=device-width,initial-scale=1">
            <title>${card.region}-${card.food}-탐구결과</title>
            <style>body{margin:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px;}
            img{max-width:100%;border-radius:4px;}
            p{color:#fff;font-family:sans-serif;font-size:14px;text-align:center;padding:0 20px;line-height:1.6;}</style>
            </head><body>
            <img src="${dataURL}" alt="탐구결과"/>
            <p>이미지를 길게 누른 뒤 '사진에 저장' 또는 '이미지 저장'을 선택하세요.</p>
            </body></html>
          `);
          win.document.close();
        } else {
          alert("팝업이 차단되었습니다. 브라우저 설정에서 팝업 허용 후 다시 시도해주세요.");
        }
      } else {
        const link = document.createElement("a");
        link.download = `${card.region}-${card.food}-탐구결과.${format}`;
        link.href = dataURL;
        link.click();
      }
    } catch(e) { alert("이미지 저장 중 오류가 발생했습니다."); }
    setExporting(false);
  }

  return (
    <div className="fade-up" style={{maxWidth:860,margin:"0 auto",padding:"20px 20px 40px"}}>
      {/* 상단 버튼 바 */}
      <div className="no-print" style={{
        display:"flex",gap:8,marginBottom:16,flexWrap:"wrap",alignItems:"center"
      }}>
        <button onClick={onBack} style={{
          background:"var(--surface)",border:"1px solid var(--border)",color:"var(--ink-mid)",
          borderRadius:3,padding:"7px 16px",fontSize:13,cursor:"pointer",fontFamily:"inherit",
          letterSpacing:"0.04em"
        }}>
          ← 편집으로 돌아가기
        </button>
        <div style={{flex:1}}/>
        <button onClick={()=>window.print()} style={{
          background:"var(--surface)",border:"1px solid var(--border)",color:"var(--navy)",
          borderRadius:3,padding:"7px 16px",fontSize:13,cursor:"pointer",fontFamily:"inherit",
          fontWeight:600,letterSpacing:"0.04em"
        }}>
          PDF 저장 (인쇄)
        </button>
        <button onClick={()=>downloadImage("png")} disabled={exporting} style={{
          background:"var(--navy)",border:"none",color:"#fff",
          borderRadius:3,padding:"7px 16px",fontSize:13,cursor:exporting?"wait":"pointer",
          fontFamily:"inherit",fontWeight:600,letterSpacing:"0.04em",opacity:exporting?0.6:1
        }}>
          {exporting?"처리 중...":(isIOS?"PNG 이미지 열기":"PNG 다운로드")}
        </button>
        <button onClick={()=>downloadImage("jpg")} disabled={exporting} style={{
          background:"var(--gold)",border:"none",color:"#fff",
          borderRadius:3,padding:"7px 16px",fontSize:13,cursor:exporting?"wait":"pointer",
          fontFamily:"inherit",fontWeight:600,letterSpacing:"0.04em",opacity:exporting?0.6:1
        }}>
          {exporting?"처리 중...":(isIOS?"JPG 이미지 열기":"JPG 다운로드")}
        </button>
      </div>

      {/* 인포그래픽 본체 */}
      <div id="infographic-root" style={{
        background:"#ffffff",
        border:`1px solid var(--border)`,
        borderRadius:6,overflow:"hidden",
        boxShadow:"0 2px 24px rgba(28,43,58,0.10)"
      }}>
        {/* 헤더 */}
        <div style={{
          background:card.color,
          padding:"24px 28px",
          display:"flex",alignItems:"flex-end",justifyContent:"space-between",
          position:"relative",overflow:"hidden"
        }}>
          {/* 배경 패턴 */}
          <div style={{
            position:"absolute",right:-20,top:-20,
            width:180,height:180,
            background:"rgba(255,255,255,0.06)",
            borderRadius:"50%"
          }}/>
          <div style={{
            position:"absolute",right:30,top:10,
            width:80,height:80,
            background:"rgba(255,255,255,0.04)",
            borderRadius:"50%"
          }}/>
          <div style={{position:"relative",zIndex:1}}>
            <div style={{fontSize:11,letterSpacing:"0.2em",color:"rgba(255,255,255,0.6)",marginBottom:6,fontWeight:500}}>
              지리 탐구 활동 2.1
            </div>
            <div style={{
              fontFamily:"'Noto Serif KR'",
              fontSize:30,fontWeight:900,color:"#fff",lineHeight:1.2,marginBottom:5
            }}>
              {card.region} × {card.food}
            </div>
            <div style={{fontSize:13,color:"rgba(255,255,255,0.75)",letterSpacing:"0.03em"}}>
              지역이 음식을 만들고, 음식이 지역을 만든다
            </div>
          </div>
          <div style={{position:"relative",zIndex:1,fontSize:52,lineHeight:1}}>{card.emoji}</div>
        </div>

        {/* 학생 정보 — 헤더 바로 아래 */}
        <StudentInfoBar info={studentInfo} card={card}/>

        {/* 개념 방향 배지 */}
        <div style={{display:"flex",borderBottom:`1px solid var(--border-light)`}}>
          {[
            {dir:"↑ Place → Food", bg:"#fdf8ee", border:"#e8d080",text:"#7a5a10",desc:`${card.region}의 환경이 ${card.food}을(를) 형성했다`},
            {dir:"↓ Food → Place", bg:"#fdf5f0", border:"#e0a070",text:"#7a3810",desc:`${card.food}이(가) ${card.region}의 경관·경제를 변화시켰다`},
          ].map((b,i)=>(
            <div key={i} style={{
              flex:1,padding:"9px 18px",background:b.bg,
              borderRight:i===0?`1px solid var(--border-light)`:"none",
              display:"flex",alignItems:"center",gap:10
            }}>
              <span style={{
                fontSize:11,fontWeight:700,letterSpacing:"0.1em",
                color:b.text,border:`1px solid ${b.border}`,
                padding:"2px 8px",borderRadius:2,whiteSpace:"nowrap",
                fontFamily:"'Noto Serif KR'"
              }}>{b.dir}</span>
              <span style={{fontSize:12,color:"var(--ink-mid)"}}>{b.desc}</span>
            </div>
          ))}
        </div>

        {/* 2×2 카드 그리드 */}
        <div style={{padding:"18px",background:"#f7f7f7"}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
            {SLOTS.map((slot,i)=>{
              const isPlace = slot.section === "place";
              return (
                <div key={i} style={{
                  background:"#fff",
                  border:`1px solid ${isPlace?"#e8d88055":"#e0a07055"}`,
                  borderRadius:4,overflow:"hidden",
                  display:"flex",flexDirection:"row",
                  boxShadow:"0 1px 6px rgba(28,43,58,0.05)"
                }}>
                  {/* 색상 바 */}
                  <div style={{width:4,background:isPlace?"#c8a030":"#b86030",flexShrink:0}}/>
                  {/* 이미지 — 고정 정사각형 */}
                  <div style={{
                    width:IMG_SIZE,height:IMG_SIZE,flexShrink:0,
                    background:"#f5f5f5",overflow:"hidden",position:"relative"
                  }}>
                    {imgSrcs[i] ? (
                      <img src={imgSrcs[i]} alt={slot.label}
                        style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/>
                    ) : (
                      <div style={{
                        width:"100%",height:"100%",display:"flex",
                        alignItems:"center",justifyContent:"center",
                        fontSize:11,color:"var(--ink-soft)",letterSpacing:"0.05em"
                      }}>사진 없음</div>
                    )}
                    {/* 번호 */}
                    <div style={{
                      position:"absolute",top:6,left:6,
                      background:isPlace?"#c8a030":"#b86030",
                      color:"#fff",borderRadius:2,width:20,height:20,
                      display:"flex",alignItems:"center",justifyContent:"center",
                      fontSize:12,fontWeight:700,
                      fontFamily:"'Noto Serif KR'"
                    }}>{i+1}</div>
                  </div>
                  {/* 텍스트 */}
                  <div style={{
                    padding:"12px 14px",flex:1,
                    display:"flex",flexDirection:"column",justifyContent:"center",
                    minHeight:IMG_SIZE
                  }}>
                    <div style={{
                      fontSize:12,fontWeight:700,color:isPlace?"#9a7818":"#904820",
                      marginBottom:3,letterSpacing:"0.04em"
                    }}>{slot.label}</div>
                    <div style={{fontSize:11,color:"var(--ink-soft)",marginBottom:8}}>{slot.sub}</div>
                    <div style={{fontSize:13,color:"var(--ink)",lineHeight:1.75}}>
                      {captions[i] || <span style={{color:"#c0c8d0",fontStyle:"italic",fontSize:12}}>설명 없음</span>}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        {/* 인과 흐름 */}
        <div style={{margin:"0 18px 14px",background:"#f5f5f5",border:"1px solid var(--border)",borderRadius:4,padding:"12px 16px"}}>
          <div style={{fontSize:11,color:"var(--ink-soft)",fontWeight:700,letterSpacing:"0.1em",marginBottom:8}}>인과 흐름</div>
          <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
            {[
              {label:"자연환경",   bg:"#e8d060",text:"#5a3a00"},
              {label:"식재료 생산",bg:"#d4a840",text:"#4a2a00"},
              {label:"음식 문화 & 소비",bg:"#c07830",text:"#fff"},
              {label:"지역경관 변화",bg:"#a85020",text:"#fff"},
            ].map((s,i)=>(
              <React.Fragment key={i}>
                <span style={{
                  background:s.bg,borderRadius:2,
                  padding:"4px 10px",fontSize:12,fontWeight:600,color:s.text
                }}>{s.label}</span>
                {i<3 && <span style={{color:"var(--border)",fontSize:16}}>›</span>}
              </React.Fragment>
            ))}
          </div>
        </div>

        {/* 탐구 종합 진술문 */}
        {summary && (
          <div style={{margin:"0 18px 14px",borderRadius:4,overflow:"hidden",border:"1px solid var(--border)"}}>
            <div style={{background:"#f7f7f7",padding:"12px 16px"}}>
              <div style={{fontSize:11,fontWeight:700,color:"var(--ink-soft)",letterSpacing:"0.1em",marginBottom:8}}>탐구 종합 진술문</div>
              <div style={{
                fontSize:14,color:"var(--ink)",lineHeight:1.9,
                fontStyle:"normal",
                borderLeft:"3px solid var(--gold)",paddingLeft:12
              }}>{summary}</div>
            </div>
          </div>
        )}

        {/* 발표 질문 */}
        <div style={{margin:"0 18px 18px",border:`1px solid var(--border)`,borderRadius:4,overflow:"hidden"}}>
          <div style={{background:"#f7f7f7",padding:"12px 16px"}}>
            <div style={{fontSize:11,fontWeight:700,color:"var(--ink-soft)",letterSpacing:"0.1em",marginBottom:8}}>발표 질문</div>
            <div style={{
              fontFamily:"'Noto Serif KR'",
              fontSize:15,color:"var(--navy)",lineHeight:1.9,fontWeight:600
            }}>
              "{card.region}의 어떤 환경이 {card.food}을(를) 형성했고,<br/>
              {card.food}은(는) {card.region}의 경관과 경제를 어떻게 변화시켰는가?"
            </div>
          </div>
        </div>

        {/* 푸터 */}
        <div style={{
          padding:"9px 20px",
          background:"#ffffff",
          borderTop:"1px solid var(--border)",
          display:"flex",justifyContent:"space-between",alignItems:"center"
        }}>
          <div style={{fontSize:11,color:"var(--ink-soft)",letterSpacing:"0.05em"}}>
            지리 탐구 활동 2.1 · {card.region} × {card.food}
          </div>
          <div style={{fontSize:11,color:"var(--ink-soft)"}}>{dateStr}</div>
        </div>
      </div>
    </div>
  );
}

// ─── 종합 진술문 입력 ─────────────────────────────────────────
function SummaryInput({ value, onChange }) {
  const LIMIT = 220;
  const charCount = value.length;
  return (
    <div style={{
      background:"var(--surface)",border:"1px solid var(--border)",
      borderRadius:4,padding:"14px 16px",marginBottom:16
    }}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:8}}>
        <div>
          <span style={{fontSize:13,fontWeight:700,color:"var(--navy)",letterSpacing:"0.04em"}}>탐구 종합 진술문</span>
          <span style={{fontSize:11,color:"var(--ink-soft)",marginLeft:8}}>선택 사항</span>
        </div>
        <span style={{fontSize:11,color:charCount>=LIMIT*0.8?"#9a7020":"var(--ink-soft)"}}>
          {charCount} / {LIMIT}
        </span>
      </div>
      <div style={{fontSize:12,color:"var(--ink-soft)",lineHeight:1.8,marginBottom:10}}>
        Place → Food → Place 인과 흐름을 자신의 언어로 2~3문장으로 종합하세요.<br/>
        <span style={{color:"var(--gold)",fontWeight:600}}>예)</span> "제주의 온난한 기후와 현무암 토양은 감귤 재배에 최적의 환경을 제공했고, 이로 인해 발달한 감귤 산업은 체험 농장과 가공식품 시장을 형성하며 제주의 대표적 관광·경제 경관으로 지역을 재구성하였다."
      </div>
      <textarea rows={3} maxLength={LIMIT} value={value} onChange={e=>onChange(e.target.value)}
        placeholder="탐구를 통해 발견한 지역과 음식의 인과관계를 자신의 언어로 종합해보세요."
        style={{
          width:"100%",background:"#fff",border:"1px solid var(--border)",
          borderRadius:3,color:"var(--ink)",fontSize:13,padding:"9px 11px",
          resize:"none",lineHeight:1.7
        }}/>
    </div>
  );
}

// ─── 메인 앱 ──────────────────────────────────────────────────
function App() {
  const saved = loadLS() || {};
  const [selected,       setSelected]       = React.useState(saved.selected ?? null);
  const [captions,       setCaptions]       = React.useState(saved.captions ?? ["","","",""]);
  const [imgSrcs,        setImgSrcs]        = React.useState(saved.imgSrcs ?? [null,null,null,null]);
  const [studentInfo,    setStudentInfo]    = React.useState(saved.studentInfo ?? {name:"",classInfo:"",group:""});
  const [summary,        setSummary]        = React.useState(saved.summary ?? "");
  const [showResult,     setShowResult]     = React.useState(false);
  const [customCard,     setCustomCard]     = React.useState(saved.customCard ?? {region:"",food:"",emoji:"🍊"});
  const [showCustomForm, setShowCustomForm] = React.useState(false);

  React.useEffect(()=>{
    saveLS({selected,captions,studentInfo,summary,customCard,
      imgSrcs:imgSrcs.map(s=>s&&s.length<500000?s:null)});
  },[selected,captions,imgSrcs,studentInfo,summary,customCard]);

  const hasCustomCard = customCard.region.trim() && customCard.food.trim();
  const CARDS = [...PRESET_CARDS, hasCustomCard
    ? {region:customCard.region,food:customCard.food,color:"#3a2860",light:"#5a4080",emoji:customCard.emoji}
    : null
  ].filter(Boolean);

  const card       = selected !== null && selected < CARDS.length ? CARDS[selected] : null;
  const exampleKey = card ? `${card.region}-${card.food}` : "";
  const filledCaptions = captions.filter(c=>c.trim()).length;
  const filledImgs     = imgSrcs.filter(Boolean).length;
  const filled         = filledCaptions + filledImgs;
  const readyToShow    = filledCaptions >= 2;

  function selectCard(i) {
    if(i !== selected){ setSelected(i); setCaptions(["","","",""]); setImgSrcs([null,null,null,null]); setSummary(""); setShowResult(false); }
    if(i === CUSTOM_IDX) setShowCustomForm(true);
  }

  if(showResult && card) return (
    <Infographic card={card} captions={captions} imgSrcs={imgSrcs}
      studentInfo={studentInfo} summary={summary}
      onBack={()=>setShowResult(false)}/>
  );

  return (
    <div style={{padding:"24px 20px 40px",maxWidth:860,margin:"0 auto"}}>

      {/* 페이지 제목 */}
      <div style={{marginBottom:28}}>
        <div style={{
          display:"flex",alignItems:"center",gap:10,marginBottom:12
        }}>
          <div style={{width:4,height:20,background:"var(--navy)",borderRadius:2}}/>
          <span style={{fontSize:11,fontWeight:700,letterSpacing:"0.18em",color:"var(--ink-soft)"}}>지리 탐구 활동 2.1</span>
        </div>
        <h1 style={{
          fontFamily:"'Noto Serif KR'",
          fontSize:28,fontWeight:900,color:"var(--navy)",lineHeight:1.3,marginBottom:6
        }}>
          지역이 음식을 만들고,<br/>음식이 지역을 만든다
        </h1>
        <p style={{fontSize:13,color:"var(--ink-soft)",lineHeight:1.7}}>
          카드를 선택하고 사진과 설명을 입력하여 탐구 결과물을 완성하세요.
        </p>
      </div>

      {/* 학생 정보 — 제목 바로 아래 */}
      <div style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:4,padding:"14px 16px",marginBottom:24}}>
        <div style={{fontSize:11,fontWeight:700,color:"var(--navy)",letterSpacing:"0.08em",marginBottom:12}}>학생 정보</div>
        <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
          {[
            {key:"name",     label:"이름",            placeholder:"홍길동",        flex:1},
            {key:"classInfo",label:"학년 · 반 · 번호", placeholder:"예) 2학년 3반 15번", flex:2},
            {key:"group",    label:"모둠 (선택)",      placeholder:"예) 3모둠",     flex:1},

              <div style={{fontSize:11,color:"var(--ink-soft)",marginBottom:5,letterSpacing:"0.05em"}}>{f.label}</div>

            </div>
          ))}
        </div>

      <ConceptIntro/>

      <div style={{marginBottom:24}}>

          display:"flex",alignItems:"center",gap:10,marginBottom:12
        }}>

            fontSize:11,fontWeight:700,letterSpacing:"0.12em",
            color:"var(--surface)",background:"var(--navy)",

          ))}
          {/* 직접 입력 카드 */}
          <div onClick={()=>{selectCard(CUSTOM_IDX);setShowCustomForm(true);}} className="card-hover"
            style={{
              background:selected===CUSTOM_IDX&&hasCustomCard?"#3a2860":"var(--surface)",
              border:`1.5px dashed ${selected===CUSTOM_IDX?"#6a4a90":"var(--border)"}`,
              borderRadius:4,padding:"12px 16px",cursor:"pointer",
              textAlign:"center",minWidth:85,transition:"all 0.2s",
              boxShadow:selected===CUSTOM_IDX&&hasCustomCard?"0 4px 20px #3a286055":"none"
            }}>
            <div style={{fontSize:28,marginBottom:5}}>
              {hasCustomCard&&selected===CUSTOM_IDX?customCard.emoji:"＋"}
            </div>
            <div style={{fontSize:14,fontWeight:700,color:selected===CUSTOM_IDX&&hasCustomCard?"#fff":"var(--ink-mid)"}}>
              {hasCustomCard&&selected===CUSTOM_IDX?customCard.region:"직접 입력"}
            </div>
            <div style={{fontSize:12,color:selected===CUSTOM_IDX&&hasCustomCard?"rgba(255,255,255,0.75)":"var(--ink-soft)",marginTop:1}}>
              {hasCustomCard&&selected===CUSTOM_IDX?customCard.food:"나만의 카드"}
            </div>
          </div>
        </div>
        {(selected===CUSTOM_IDX||showCustomForm) && (
          <CustomCardForm custom={customCard} onChange={setCustomCard}/>
        )}
      </div>

      {/* STEP 2 */}
      {card && (
        <div>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
            <span style={{
              fontSize:11,fontWeight:700,letterSpacing:"0.12em",
              color:"var(--surface)",background:"var(--navy)",
              padding:"3px 8px",borderRadius:2
            }}>STEP 2</span>
            <span style={{fontSize:13,fontWeight:700,color:"var(--navy)"}}>사진 · 설명 입력</span>
          </div>

          {/* Place → Food */}
          <div style={{background:"#fafff5",border:"1px solid #e8d87055",borderRadius:4,padding:"16px",marginBottom:12}}>
            <SectionLabel text={`${card.region}의 환경이 ${card.food}을(를) 만든 배경`} direction="place"/>
            <div style={{display:"flex",gap:14,flexWrap:"wrap",justifyContent:"center"}}>
              {SLOTS.filter(s=>s.section==="place").map((slot,i)=>(
                <Slot key={i} slot={slot} caption={captions[i]} imgSrc={imgSrcs[i]}
                  cardColor={card.color} exampleKey={exampleKey}
                  onCaptionChange={v=>{const n=[...captions];n[i]=v;setCaptions(n);}}
                  onImgChange={v=>{const n=[...imgSrcs];n[i]=v;setImgSrcs(n);}}/>
              ))}
            </div>
          </div>

          {/* Food → Place */}
          <div style={{background:"#fff8f5",border:"1px solid #e0a06055",borderRadius:4,padding:"16px",marginBottom:16}}>
            <SectionLabel text={`${card.food}이(가) ${card.region}을 바꾼 방식`} direction="food"/>
            <div style={{display:"flex",gap:14,flexWrap:"wrap",justifyContent:"center"}}>
              {SLOTS.filter(s=>s.section==="food").map((slot,i)=>(
                <Slot key={i} slot={slot} caption={captions[i+2]} imgSrc={imgSrcs[i+2]}
                  cardColor={card.color} exampleKey={exampleKey}
                  onCaptionChange={v=>{const n=[...captions];n[i+2]=v;setCaptions(n);}}
                  onImgChange={v=>{const n=[...imgSrcs];n[i+2]=v;setImgSrcs(n);}}/>
              ))}
            </div>
          </div>

          <SummaryInput value={summary} onChange={setSummary}/>

          {/* 완성도 + 결과 버튼 */}
          <div style={{background:"var(--surface)",borderRadius:4,padding:"14px 16px",border:"1px solid var(--border)"}}>
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
              <span style={{fontSize:12,color:"var(--ink-soft)",whiteSpace:"nowrap",fontWeight:600}}>완성도</span>
              <div style={{flex:1,height:5,background:"var(--border-light)",borderRadius:3}}>
                <div style={{
                  height:"100%",borderRadius:3,
                  background:`linear-gradient(90deg, ${card.color}cc, ${card.color})`,
                  width:`${Math.min((filled/8)*100,100)}%`,transition:"width 0.3s"
                }}/>
              </div>
              <span style={{fontSize:12,color:"var(--navy)",fontWeight:700,whiteSpace:"nowrap"}}>
                {Math.min(filled,8)} / 8
              </span>
            </div>
            <button onClick={()=>setShowResult(true)} disabled={!readyToShow} style={{
              width:"100%",padding:"12px",borderRadius:3,border:"none",
              background:readyToShow?card.color:"#d8d4cc",
              color:readyToShow?"#fff":"var(--ink-soft)",
              fontSize:15,fontWeight:700,cursor:readyToShow?"pointer":"not-allowed",
              fontFamily:"inherit",transition:"all 0.25s",letterSpacing:"0.04em",
              boxShadow:readyToShow?`0 4px 18px ${card.color}55`:"none"
            }}>
              {readyToShow?"탐구 결과 인포그래픽 보기 →":`설명을 ${2-filledCaptions}개 더 입력하면 결과를 볼 수 있습니다`}
            </button>
            <div style={{fontSize:11,color:"var(--ink-soft)",textAlign:"center",marginTop:8,letterSpacing:"0.03em"}}>
              {isIOS
                ? "입력 내용은 이 브라우저(탭)에 자동 저장됩니다"
                : "입력 내용은 이 브라우저에 자동 저장됩니다"}
            </div>
          </div>
        </div>
      )}

      {selected===null && (
        <div style={{
          textAlign:"center",padding:"60px 20px",
          color:"var(--ink-soft)",fontSize:14,
          border:"1px dashed var(--border)",borderRadius:4,
          letterSpacing:"0.03em"
        }}>
          위의 카드 중 하나를 선택하면 활동 양식이 나타납니다
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
