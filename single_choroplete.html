const DATA = {};
RAW.forEach(([name,ratio,single,total]) => {
  if (!DATA[name]) DATA[name] = {ratio,single,total};
});

// 방법 A: 5단계, 5%p 간격
const BREAKS = [30, 35, 40, 45];
const COLORS = ['#EFF3FF','#9ECAE1','#3182BD','#08519C','#03244E'];
const LABELS = ['30% 미만','30–35%','35–40%','40–45%','45% 이상'];
const NAT_AVG = 37.4;

function getColor(v) {
  for (let i=0; i<BREAKS.length; i++) if (v < BREAKS[i]) return COLORS[i];
  return COLORS[COLORS.length-1];
}

const map = L.map('map',{center:[36.5,127.8],zoom:7});
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{
  attribution:'© OpenStreetMap © CARTO', subdomains:'abcd', maxZoom:19
}).addTo(map);

const infoEl = document.getElementById('info');
let gLayer;

function featureStyle(f) {
  const d = DATA[f.properties.name];
  return {
    fillColor: d ? getColor(d.ratio) : '#DDDBD7',
    fillOpacity: d ? 0.82 : 0.25,
    color:'white', weight:0.7, opacity:1
  };
}

gLayer = L.geoJSON(GEOJSON, {
  style: featureStyle,
  onEachFeature(f, layer) {
    layer.on({
      mouseover(e) {
        e.target.setStyle({weight:2, color:'#444', fillOpacity:0.95});
        e.target.bringToFront();
        const d = DATA[f.properties.name];
        if (!d) return;
        infoEl.style.display='block';
        infoEl.innerHTML = `<strong>${f.properties.name}</strong>
          <div class="info-val" style="color:${getColor(d.ratio)}">${d.ratio}%</div>
          <div class="info-sub">1인가구 ${d.single.toLocaleString()}명<br>전체 ${d.total.toLocaleString()}가구<br>전국 평균(${NAT_AVG}%) 대비 ${d.ratio>NAT_AVG?'+':''}${(d.ratio-NAT_AVG).toFixed(1)}%p</div>`;
      },
      mouseout(e) {
        gLayer.resetStyle(e.target);
        infoEl.style.display='none';
      },
      click(e) {
        const d = DATA[f.properties.name];
        if (!d) return;
        layer.bindPopup(`
          <div style="font-family:'Noto Sans KR',sans-serif;min-width:165px;line-height:1.9">
            <div style="font-size:14px;font-weight:700;color:#111;margin-bottom:5px">${f.properties.name}</div>
            <div style="font-size:22px;font-weight:700;color:${getColor(d.ratio)};margin-bottom:4px">${d.ratio}%</div>
            <div style="font-size:11px;color:#555">
              1인가구 <strong>${d.single.toLocaleString()}</strong>명<br>
              전체 가구 <strong>${d.total.toLocaleString()}</strong>가구<br>
              전국 평균 대비 <strong style="color:${d.ratio>NAT_AVG?'#08519C':'#888'}">${d.ratio>NAT_AVG?'+':''}${(d.ratio-NAT_AVG).toFixed(1)}%p</strong>
            </div>
          </div>`,{maxWidth:220}).openPopup(e.latlng);
      }
    });
  }
}).addTo(map);

const leg = L.control({position:'bottomright'});
leg.onAdd = () => {
  const div = L.DomUtil.create('div','legend');
  div.innerHTML = `
    <div class="legend-title">1인가구 비율 (%)</div>
    <div class="legend-rows">
      ${COLORS.map((c,i)=>`
        <div class="legend-row">
          <div class="legend-swatch" style="background:${c}"></div>
          <span>${LABELS[i]}</span>
        </div>`).join('')}
    </div>
    <div class="legend-avg">
      <div class="legend-avg-line"></div>
      <span>전국 평균 ${NAT_AVG}%</span>
    </div>
    <div class="legend-note">출처: 통계청 인구총조사 (2024)<br>클릭: 상세 | 마우스오버: 간략</div>`;
  return div;
};
leg.addTo(map);
</script>
