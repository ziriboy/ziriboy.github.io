const map = L.map('map').setView([37.277, 127.022], 13);
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{attribution:'© CartoDB',maxZoom:19}).addTo(map);

const tt = document.getElementById('tt');
const wrap = document.getElementById('map-wrap');

function showTip(e, html) {
  tt.innerHTML = html; tt.style.display = 'block'; moveTip(e);
}
function moveTip(e) {
  const r = wrap.getBoundingClientRect();
  let x = e.clientX - r.left + 14, y = e.clientY - r.top - 14;
  if (x + 230 > r.width) x -= 250;
  tt.style.left = x + 'px'; tt.style.top = y + 'px';
}
function hideTip() { tt.style.display = 'none'; }
wrap.addEventListener('mousemove', e => { if (tt.style.display==='block') moveTip(e); });

const maxT = Math.max(...DONG.map(d=>d.total));
const maxOD = Math.max(...OD.map(d=>d.total));

function dColor(v) {
  const t = v/maxT;
  if (t>.78) return '#ef4444';
  if (t>.55) return '#f97316';
  if (t>.35) return '#fbbf24';
  if (t>.18) return '#3b82f6';
  return '#1e40af';
}

const gOD = L.layerGroup().addTo(map);
const gDong = L.layerGroup().addTo(map);
const gStop = L.layerGroup().addTo(map);

// OD 흐름선
OD.forEach((d,i) => {
  const w = 2 + (d.total/maxOD)*9;
  const op = 0.35 + (d.total/maxOD)*0.55;
  const [f,t] = [d.fc, d.tc];
  const mx = (f[0]+t[0])/2 + (t[1]-f[1])*0.18;
  const my = (f[1]+t[1])/2 - (t[0]-f[0])*0.18;
  const line = L.polyline([[f[0],f[1]],[mx,my],[t[0],t[1]]], {color:'#3b82f6',weight:w,opacity:op,smoothFactor:1});
  line.on('mouseover', function(e){
    showTip(e.originalEvent,`<div class="tt-h">${d.from} → ${d.to}</div>
      <div class="tt-r">심야 합계: <span class="tt-v">${d.total.toLocaleString()}명/일</span></div>
      <div class="tt-r">야간(21~23시): <span class="tt-v">${d.night.toLocaleString()}</span></div>
      <div class="tt-r">새벽(0~6시): <span class="tt-v">${d.dawn.toLocaleString()}</span></div>
      <div class="tt-s">전체 TOP ${i+1}</div>`);
    this.setStyle({opacity:1,weight:w+2});
  });
  line.on('mouseout', function(){ hideTip(); this.setStyle({opacity:op,weight:w}); });
  gOD.addLayer(line);
});

// 읍면동 원형 + 라벨
DONG.forEach(d => {
  const r = 120 + (d.total/maxT)*550;
  const c = dColor(d.total);
  const circle = L.circle(d.coord,{radius:r,color:c,fillColor:c,fillOpacity:0.3,weight:1.5,opacity:0.8});
  circle.on('mouseover', function(e){
    showTip(e.originalEvent,`<div class="tt-h">${d.name}</div>
      <div class="tt-r">총 심야 수요: <span class="tt-v">${d.total.toLocaleString()}명/일</span></div>
      <div class="tt-r">나가는 이동: <span class="tt-v">${d.out.toLocaleString()}</span></div>
      <div class="tt-r">들어오는 이동: <span class="tt-v">${d.in.toLocaleString()}</span></div>`);
    this.setStyle({fillOpacity:0.55});
  });
  circle.on('mouseout', function(){ hideTip(); this.setStyle({fillOpacity:0.3}); });
  const lbl = L.marker(d.coord,{icon:L.divIcon({
    html:`<div style="font-size:10px;font-weight:700;color:#1e293b;text-shadow:0 0 3px #fff,0 0 6px #fff;white-space:nowrap;">${d.name}</div>`,
    className:'',iconAnchor:[18,7]
  })});
  gDong.addLayer(circle);
  gDong.addLayer(lbl);
