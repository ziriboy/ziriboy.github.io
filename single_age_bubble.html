function diffColor(diff) {
  const t = Math.max(-1, Math.min(1, diff / 55));
  const lerp = (a,b,t) => Math.round(a+(b-a)*t);
  if (t >= 0) return `rgb(${lerp(220,46,t)},${lerp(220,95,t)},${lerp(220,168,t)})`;
  const a = -t;
  return `rgb(${lerp(220,184,a)},${lerp(220,64,a)},${lerp(220,64,a)})`;
}

const maxTotal = Math.max(...DATA.map(d => d[5]));
function radius(total) { return Math.sqrt(total / maxTotal) * 17; }

const map = L.map('map', {center:[36.5,127.8], zoom:7});
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap © CARTO', subdomains:'abcd', maxZoom:19
}).addTo(map);

DATA.forEach(([name, lat, lon, young, old, total]) => {
  const diff = young - old;
  const color = diffColor(diff);
  const r = radius(total);
  const circle = L.circleMarker([lat, lon], {
    radius: r, fillColor: color, fillOpacity: 0.80,
    color: 'white', weight: 0.8
  }).addTo(map);

  circle.bindPopup(`
    <div style="font-family:'Noto Sans KR',sans-serif;min-width:160px;line-height:1.9">
      <div style="font-size:14px;font-weight:700;color:${diff>0?'#2E5FA8':'#B84040'};margin-bottom:4px">${name}</div>
      <div style="font-size:10px;font-weight:700;color:${diff>0?'#2E5FA8':'#B84040'};margin-bottom:6px">${diff>0?'청년 집중':'노년 집중'} 지역</div>
      <div style="font-size:12px">
        <span style="color:#3A6EA8">● 청년(20–39세)</span> <strong>${young.toFixed(1)}%</strong><br>
        <span style="color:#B84040">● 노년(65세+)</span>&nbsp;&nbsp; <strong>${old.toFixed(1)}%</strong><br>
        <span style="color:#888">● 청년–노년 차이</span> <strong>${diff>0?'+':''}${diff.toFixed(1)}%p</strong><br>
        <span style="color:#888">● 1인가구 총수</span> <strong>${total.toLocaleString()}명</strong>
      </div>
    </div>`, {maxWidth:230});
});
